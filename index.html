<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE友だち追加</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
background:#f4f6fb;
}

.container{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
padding:30px 20px;
text-align:center;
}

.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #eee;
}

h1{
font-size:26px;
margin-top:18px;
margin-bottom:10px;
}

.desc{
color:#555;
line-height:1.8;
margin-bottom:25px;
}

.linebtn{
display:inline-block;
background:#06c755;
color:white;
text-decoration:none;
padding:14px 28px;
border-radius:999px;
font-weight:bold;
margin-bottom:25px;
}

.box{
background:#fafafa;
border:1px solid #eee;
border-radius:18px;
padding:20px;
margin-top:18px;
}

.lineid{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

.btn{
background:black;
color:white;
border:none;
padding:10px 18px;
border-radius:999px;
cursor:pointer;
}

.qr{
width:220px;
margin-top:10px;
border-radius:12px;
}

.steps{
text-align:left;
font-size:14px;
margin-top:15px;
line-height:1.9;
color:#444;
}

.footer{
margin-top:25px;
color:#666;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<img src="profile.jpg" class="profile">

<h1>高橋良介です</h1>

<p class="desc">
LINE追加ありがとうございます。<br>
ご相談・お問い合わせはLINEからお気軽にご連絡ください。
</p>

<a class="linebtn" href="https://lin.ee/cAO1NZa">
LINEを友だち追加する
</a>

<div class="box">

<h2>または</h2>
<h2>LINE IDで追加</h2>

<p>LINEアプリの検索から追加できます</p>

<div class="lineid" id="lineid">@027tkdqj</div>

<button class="btn" onclick="copyid()">LINE IDをコピー</button>

<div class="steps">

1. LINEアプリを開く<br>
2. ホーム右上の「友だち追加」<br>
3. 「検索」を押す<br>
4. 「@027tkdqj」を入力

</div>

</div>

<div class="box">

<h2>QRコードで追加</h2>

<p>QRコードからも追加できます</p>

<img src="qr.png" class="qr"><br><br>

<a href="qr.png" download class="btn">QRコードを保存</a>

</div>

<div class="footer">

追加後に一言メッセージを送っていただけると<br>
スムーズにご案内できます。

</div>

</div>

<script>

function copyid(){

navigator.clipboard.writeText("@027tkdqj")

alert("LINE IDをコピーしました")

}

</script>

</body>
</html>
